<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Me Mother Earth</title>
  <meta name="description" content="Me Mother Earth — sustainable home essentials. Site coming soon.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: "Montserrat", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background-color: #EDEDED;
      color: #5E704C;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    main {
      text-align: center;
      max-width: 32rem;
    }

    h1 {
      font-family: "Abril Fatface", Georgia, serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 400;
      color: #5E704C;
      letter-spacing: 0.02em;
      line-height: 1.2;
      margin-bottom: 1.5rem;
    }

    .badge {
      display: inline-block;
      background-color: #ECDFC9;
      color: #5E704C;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.5rem 1.25rem;
      border-radius: 999px;
      margin-bottom: 1.25rem;
    }

    p {
      font-size: 1rem;
      line-height: 1.7;
      color: #A1AB97;
    }
  </style>
</head>
<body>
  <main>
    <p class="badge">Coming soon</p>
    <h1>Me Mother Earth</h1>
    <p>We're building something new. Check back soon.</p>
  </main>
</body>
</html>
